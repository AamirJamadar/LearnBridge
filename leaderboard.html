<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leaderboard - LearnBridge</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23667eea'/%3E%3Cstop offset='100%25' stop-color='%23f093fb'/%3E%3C/linearGradient%3E%3Crect width='512' height='512' rx='120' fill='url(%23g)'/%3E%3Ctext x='50%25' y='55%25' text-anchor='middle' dominant-baseline='middle' font-family='Arial, sans-serif' font-weight='800' font-size='260' fill='white'%3ELB%3C/text%3E%3C/svg%3E">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Animated Gradient Background -->
    <div class="gradient-bg"></div>
    
    <!-- Sidebar Navigation - Loaded dynamically -->
    <div id="sidebarContainer"></div>

    <!-- Main Content Area -->
    <main class="main-content" id="mainContent">
        <!-- Top Navbar -->
        <header class="top-navbar">
            <div class="navbar-left">
                <button class="mobile-menu-btn" id="mobileMenuBtn">
                    <i class="fas fa-bars"></i>
                </button>
                <h1 class="page-title">Leaderboard</h1>
            </div>
            <div class="navbar-right">
                <!-- Gamification: XP and Level Display -->
                <div class="xp-display" id="xpDisplay">
                    <div class="xp-item">
                        <i class="fas fa-star"></i>
                        <span class="xp-value" id="xpValue">0</span>
                        <span class="xp-label">XP</span>
                    </div>
                    <div class="level-display">
                        <span class="level-badge" id="levelBadge">Lv.1</span>
                        <div class="level-progress-container">
                            <div class="level-progress-bar" id="levelProgressBar" style="width: 0%;"></div>
                        </div>
                        <span class="level-next" id="levelNext">0/100</span>
                    </div>
                    <div class="badges-display" id="badgesDisplay">
                        <i class="fas fa-medal" title="Badges"></i>
                        <span class="badge-count" id="badgeCount">0</span>
                    </div>
                </div>
                <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
                    <i class="fas fa-moon"></i>
                </button>
                <div class="user-profile">
                    <img src="https://via.placeholder.com/40" alt="User Avatar" class="user-avatar">
                    <span class="user-name">John Doe</span>
                </div>
            </div>
        </header>

        <!-- Content Area -->
        <div class="content-area">
            <!-- Leaderboard Section -->
            <section class="content-section active" id="leaderboard">
                <div class="section-header">
                    <h2>Leaderboard</h2>
                    <p>See how you rank against other learners</p>
                </div>
                <div class="cards-grid leaderboard-grid" id="topThreeContainer">
                    <!-- Top 3 leaderboard cards will be dynamically injected here -->
                </div>

                <div class="card">
                    <div class="card-header">
                        <h3>Your Ranking</h3>
                    </div>
                    <div class="card-body">
                        <table class="leaderboard-table">
                            <thead>
                                <tr>
                                    <th>Rank</th>
                                    <th>User</th>
                                    <th>Points</th>
                                    <th>Badges</th>
                                </tr>
                            </thead>
                            <tbody id="leaderboardTableBody">
                                <!-- Leaderboard rows will be dynamically injected here -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="js/auth.js"></script>
    <script src="js/leaderboard.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
